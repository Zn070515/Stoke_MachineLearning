# Global configuration
project:
  name: stoke-ml
  data_dir: ./data
  model_dir: ./models/checkpoints

# Market configuration
markets:
  a_shares:
    enabled: true
    stock_universe: [csi300, csi500]
    start_date: "2015-01-01"
  us:
    enabled: false
    stock_universe: [sp500]
    start_date: "2015-01-01"

# Crawler configuration
crawler:
  tls_impersonate: "chrome120"
  browserforge:
    browser: "chrome"
    device: "desktop"
    os: "windows"
  session_pool:
    max_sessions: 50
    max_age_minutes: 30
    max_usage: 30
    max_error_score: 3.0
  proxy:
    enabled: false
    tier: "free"
    validate_on_startup: true
    max_proxies: 20
  rate_limit:
    base_delay_sec: 1.0
    jitter_factor: 0.5
    max_backoff_sec: 300
    circuit_breaker_cooldown_sec: 300
    circuit_breaker_fail_threshold: 10
    daily_quota_per_domain: 10000
  concurrency:
    enabled: false
    max_workers: 4
  browser_fallback:
    enabled: true
    engine: "playwright"
    stealth_js: true
    captcha_solver: "opencv"

# Feature configuration
features:
  seq_len: 60          # 序列长度 (LSTM用)
  flat_seq_len: 5      # XGBoost flat模式序列长度 (小值防维度爆炸)
  technical_indicators: true
  rule_based_scoring: true
  temporal_features: true
  use_sentiment: true
  target_horizon: 1

# Model configuration
model:
  phase: 1
  name: "xgboost"
  params:
    max_depth: 6
    learning_rate: 0.1
    n_estimators: 200
    subsample: 0.8
    colsample_bytree: 0.8

# Training configuration
training:
  batch_size: 512
  epochs: 100
  learning_rate: 0.001
  early_stopping_patience: 5
  validation:
    method: "walk_forward"
    train_years: 2
    val_months: 3

# Evaluation
evaluation:
  primary_metric: "mcc"
  financial_metrics: [sharpe, max_drawdown, win_rate, profit_factor]

# News source configuration
news_sources:
  sina: true
  xueqiu: true
  ths: true

# Market data types to download
market_data:
  dragon_tiger: true
  margin_trading: true
  northbound: true
  etf_flow: true

# Fundamental data
fundamental:
  enabled: true
  max_stale_days: 30  # how long quarterly data stays fresh before NaN
  interpolate: true    # linear interp between disclosure dates (smoother than step fill)
  data_types: [roe, roa, pe, pb, eps, revenue_yoy, profit_yoy, debt_ratio, gross_margin, net_margin]

# Preprocessing pipeline configuration
preprocessing:
  enabled: true
  output_dir: "data/preprocessed"
  registry_path: "models/features/feature_registry.json"

  text:
    quality_filter:
      min_text_length: 5
      max_duplicate_similarity: 0.9
      remove_html: true
    bipolar:
      threshold_positive: 0.2
      threshold_negative: -0.2
    time_decay:
      method: "ema"
      halflife_days: 7
    topic_model:
      enabled: true
      n_topics: "auto"
      min_topic_size: 50
      model_cache_dir: "models/bertopic"
      embedding_model: "finbert"
    aggregation:
      windows: [3, 5, 10, 20]
      use_body_sentiment: true

  numeric:
    outlier:
      method: "mad"
      threshold: 5.0
      clip: true
    missing:
      short_gap_method: "linear"
      short_gap_max: 2
      medium_gap_method: "kalman"
      medium_gap_max: 10
    cross_section:
      enabled: true
      stages: ["sector", "size", "adaptive"]
    scaling:
      method: "robust"
      window_days: 252
      winsorize_sigma: 3.0
    higher_order:
      enabled: true

  # Shape A: daily_continuous — capital flow preprocessing
  flow:
    enabled: true
    persistence_windows: [5, 10, 20]
    intensity_window: 20
    residualize: true

  # Shape B: event_sparse — per event type configuration
  event:
    block_trade:
      decay_halflife_days: 90
      forward_fill_max: 5
      short_gap_max: 5
      medium_gap_max: 60
    shareholder:
      decay_halflife_days: 90
      forward_fill_max: 5
      short_gap_max: 5
      medium_gap_max: 60
    lockup:
      decay_halflife_days: 180
      forward_fill_max: 5
      short_gap_max: 5
      medium_gap_max: 60
    dividend:
      decay_halflife_days: 365
      forward_fill_max: 5
      short_gap_max: 5
      medium_gap_max: 60

  # Shape C: cross_sectional — board & sector broadcasting
  cross_sectional:
    board:
      enabled: true
      consecutive_lookback: 20
    sector:
      enabled: true
      momentum_windows: [5, 20, 60, 252]
      breadth_normalize_window: 252

  # Shape D: categorical — concept block encoding
  concept:
    enabled: true
    top_n: 100
    min_stocks_per_board: 5

  monitor:
    enabled: true
    log_dir: "logs/quality"
    missing_warn_threshold: 0.2
    missing_error_threshold: 0.5
    constant_warn_threshold: 0.99
    drift_sigma_threshold: 3.0

  registry:
    enabled: true
    baseline_update_freq: "monthly"
